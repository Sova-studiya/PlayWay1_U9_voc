<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Games - Меню</title>
    <style>
        :root {
            --primary: #ffcc00;
            --secondary: #ff6600;
            --card-bg: rgba(255, 255, 255, 0.95);
            --overlay: rgba(0, 0, 0, 0.4);
            --text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* Используем ваше изображение как основной фон */
            background-image: url('https://i.imgur.com/uMtjuHk.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        /* Темная подложка для читаемости фона на любых экранах */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--overlay);
            z-index: -1;
        }

        .menu-container {
            width: 100%;
            max-width: 450px;
            text-align: center;
            background: rgba(20, 20, 20, 0.7);
            padding: 40px 25px;
            border-radius: 40px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 3.5rem);
            margin-bottom: 10px;
            color: var(--primary);
            text-shadow: var(--text-shadow);
            letter-spacing: 2px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            margin-bottom: 40px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .game-card {
            display: flex;
            align-items: center;
            background: var(--card-bg);
            color: #111;
            text-decoration: none;
            padding: 18px 22px;
            border-radius: 25px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* Эффект для десктопа */
        @media (hover: hover) {
            .game-card:hover {
                transform: scale(1.05);
                box-shadow: 0 15px 30px rgba(0,0,0,0.3);
                background: #ffffff;
            }
        }

        .game-card:active {
            transform: scale(0.96);
        }

        .game-icon-box {
            width: 60px;
            height: 60px;
            background: #f0f0f0;
            border-radius: 18px;
            margin-right: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            flex-shrink: 0;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }

        .game-info {
            text-align: left;
        }

        .game-title {
            font-size: 1.4rem;
            font-weight: 800;
            display: block;
            color: #1a1a1a;
            line-height: 1.2;
        }

        .game-desc {
            font-size: 0.9rem;
            color: #555;
            font-weight: 500;
            margin-top: 2px;
        }

        /* Цветовые акценты */
        .card-memo { border-right: 8px solid #4ade80; }
        .card-falling { border-right: 8px solid #fb923c; }

        /* Адаптация под маленькие мобильные устройства */
        @media (max-width: 360px) {
            .menu-container { padding: 30px 15px; }
            .game-icon-box { width: 45px; height: 45px; font-size: 1.5rem; margin-right: 12px; }
            .game-title { font-size: 1.1rem; }
            .game-desc { font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>FOOD GAMES</h1>
        <p class="subtitle">Выбери игру и начни обучение!</p>

        <div class="nav-links">
            <!-- Ссылка на Memory Food -->
            <a href="memo.html" class="game-card card-memo">
                <div class="game-icon-box">🧩</div>
                <div class="game-info">
                    <span class="game-title">Memory Food</span>
                    <span class="game-desc">Тренируй память и учи слова</span>
                </div>
            </a>

            <!-- Ссылка на Food Catcher -->
            <a href="falling.html" class="game-card card-falling">
                <div class="game-icon-box">🍎</div>
                <div class="game-info">
                    <span class="game-title">Food Catcher</span>
                    <span class="game-desc">Слушай и лови продукты</span>
                </div>
            </a>
        </div>
    </div>

</body>
</html>

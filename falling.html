<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Food Catcher - Игра</title>
    <style>
        :root {
            --primary: #ffcc00;
            --secondary: #ff6600;
            --bg-dark: #1a1a1a;
            --text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #87CEEB;
        }

        .back-to-menu {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: clamp(0.75rem, 3vw, 1rem);
            backdrop-filter: blur(5px);
            pointer-events: auto;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .back-to-menu:hover {
            background: #ff4444;
            transform: scale(1.05);
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            padding: 20px 20px 20px 140px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: clamp(1.2rem, 4vw, 2.5rem);
            color: white;
            text-shadow: var(--text-shadow);
        }

        #lives-display { letter-spacing: 8px; }
        #score-display { font-weight: 900; }

        .progress-wrapper {
            width: 100%;
            max-width: 600px;
            align-self: center;
            height: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.3);
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ffe600, #ff6600);
            transition: width 0.3s ease-out;
        }

        #phrase-label {
            pointer-events: auto;
            align-self: center;
            background: rgba(255, 255, 255, 0.95);
            padding: clamp(8px, 2vw, 15px) clamp(16px, 4vw, 35px);
            border-radius: 50px;
            font-weight: bold;
            color: #222;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            cursor: pointer;
            font-size: clamp(0.9rem, 3vw, 1.4rem);
            display: flex;
            align-items: center;
            gap: 15px;
            border: 3px solid white;
            max-width: 90vw;
            text-align: center;
        }

        .screen {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 40px;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        .screen h1 { font-size: clamp(2rem, 10vw, 5rem); margin-bottom: 20px; color: var(--primary); }
        .screen p  { font-size: clamp(1rem, 3.5vw, 1.5rem); margin-bottom: 40px; }

        button.start-btn {
            padding: clamp(12px, 3vw, 20px) clamp(30px, 8vw, 60px);
            font-size: clamp(1.2rem, 5vw, 2rem);
            background: var(--secondary);
            color: white;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            box-shadow: 0 8px 0 #993d00;
            font-weight: bold;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <a href="index.html" class="back-to-menu">⬅ МЕНЮ</a>

    <canvas id="gameCanvas"></canvas>

    <div class="ui-layer">
        <div class="top-row">
            <div id="lives-display">❤️❤️❤️</div>
            <div id="score-display">⭐ 0 / 30</div>
        </div>
        <div class="progress-wrapper">
            <div id="progress-bar"></div>
        </div>
        <div id="phrase-label"><span>🎧 Нажми, чтобы начать</span></div>
    </div>

    <div id="start-screen" class="screen">
        <h1>Food Catcher</h1>
        <p style="font-size: 1.5rem; margin-bottom: 40px;">Слушай просьбу и лови еду!</p>
        <button class="start-btn" id="start-btn">ИГРАТЬ</button>
    </div>

    <div id="end-screen" class="screen hidden">
        <h1 id="end-title">Конец!</h1>
        <p id="end-message" style="font-size: 1.8rem; margin-bottom: 40px;"></p>
        <div style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
            <button class="start-btn" id="restart-btn" style="font-size: 1.5rem;">ЕЩЕ РАЗ</button>
            <a href="index.html" class="start-btn" style="font-size: 1.5rem; text-decoration: none; background: #444; box-shadow: 0 8px 0 #222; display: flex; align-items: center; justify-content: center;">В МЕНЮ</a>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('start-btn');
    const restartBtn = document.getElementById('restart-btn');
    const startScreen = document.getElementById('start-screen');
    const endScreen = document.getElementById('end-screen');
    const phraseLabel = document.getElementById('phrase-label');
    const progressBar = document.getElementById('progress-bar');
    const scoreDisplay = document.getElementById('score-display');
    const livesDisplay = document.getElementById('lives-display');
    
    let score = 0;
    let lives = 3;
    let gameActive = false;
    let targetFood = null;
    let items = [];
    let spawnTimer = 0;
    let lastTime = 0;
    let basketX = 0;
    let basketWidth = 140;
    let basketHeight = 110;
    const WIN_SCORE = 30;
    const SPAWN_INTERVAL = 1100;
    const FALL_SPEED_RATIO = 0.0035;

    // Через сколько мс после объявления гарантированно спавним целевой продукт
    let targetSpawnDelay = 0;   // устанавливается в pickNewTarget
    let targetSpawned = false;  // уже спавнили цель в этом раунде?

    const foodData = [
        { id: 'soup', url: 'https://i.imgur.com/sTlRdkz.png' },
        { id: 'sausage', url: 'https://i.imgur.com/tvd8d34.png' },
        { id: 'sandwich', url: 'https://i.imgur.com/8aNmYAy.png' },
        { id: 'salad', url: 'https://i.imgur.com/ag6fIye.png' },
        { id: 'pizza', url: 'https://i.imgur.com/dATKGRF.png' },
        { id: 'pasta', url: 'https://i.imgur.com/2IiFf4K.png' },
        { id: 'ketchup', url: 'https://i.imgur.com/Bq4B911.png' },
        { id: 'ice cream', url: 'https://i.imgur.com/GQdiCRG.png' },
        { id: 'cupcake', url: 'https://i.imgur.com/qiRlv0l.png' },
        { id: 'chips', url: 'https://i.imgur.com/nPsqHLQ.png' },
        { id: 'chicken', url: 'https://i.imgur.com/HssmoYF.png' },
        { id: 'cheese', url: 'https://i.imgur.com/XWGClsv.png' },
        { id: 'cereal', url: 'https://i.imgur.com/XZkEBjt.png' },
        { id: 'burger', url: 'https://i.imgur.com/lYmXwKM.png' }
    ];

    const images = { background: new Image(), basket: new Image() };
    images.background.src = 'https://i.imgur.com/uMtjuHk.png';
    images.basket.src = 'https://i.imgur.com/qqI3cV7.png';

    const foodImages = {};
    foodData.forEach(f => {
        const img = new Image();
        img.src = f.url;
        foodImages[f.id] = img;
    });

    function speak(text) {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        msg.rate = 0.85;
        msg.pitch = 1.3;
        msg.lang = 'en-US';
        window.speechSynthesis.speak(msg);
    }

    function announceTarget() {
        if (!targetFood) return;
        const phrase = `Can I have ${targetFood.id}, please?`;
        phraseLabel.querySelector('span').innerText = `🎧 ${phrase}`;
        speak(phrase);
    }

    phraseLabel.addEventListener('click', (e) => { e.stopPropagation(); announceTarget(); });
    phraseLabel.addEventListener('touchstart', (e) => { e.preventDefault(); e.stopPropagation(); announceTarget(); }, { passive: false });

    function init() {
        resize();
        window.addEventListener('resize', resize);
        
        const handleMove = (e) => {
            if (!gameActive) return;
            e.preventDefault();
            const clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
            const rect = canvas.getBoundingClientRect();
            // Пересчёт с учётом масштаба CSS → реальные пиксели canvas
            const scaleX = canvas.width / rect.width;
            const x = (clientX - rect.left) * scaleX;
            basketX = Math.max(0, Math.min(canvas.width - basketWidth, x - basketWidth / 2));
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchstart', handleMove, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (e.key === 'ArrowLeft') basketX = Math.max(0, basketX - 50);
            if (e.key === 'ArrowRight') basketX = Math.min(canvas.width - basketWidth, basketX + 50);
            if (e.key === ' ') announceTarget();
        });

        startBtn.onclick = startGame;
        restartBtn.onclick = startGame;
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // Корзинка: 20% ширины экрана, от 80 до 200px
        basketWidth = Math.max(80, Math.min(canvas.width * 0.20, 200));
        basketHeight = basketWidth * 0.8;
        if (!gameActive) basketX = canvas.width / 2 - basketWidth / 2;
    }

    function startGame() {
        score = 0; lives = 3; items = []; gameActive = true;
        spawnTimer = 0; lastTime = performance.now();
        startScreen.classList.add('hidden');
        endScreen.classList.add('hidden');
        updateUI();
        pickNewTarget();
        requestAnimationFrame(gameLoop);
    }

    function pickNewTarget() {
        let next;
        do { next = foodData[Math.floor(Math.random() * foodData.length)]; } while (targetFood && next.id === targetFood.id);
        targetFood = next;
        targetSpawned = false;
        // Задержка 1000–3000 мс до гарантированного появления цели
        targetSpawnDelay = 1000 + Math.random() * 2000;
        announceTarget();
    }

    function updateUI() {
        scoreDisplay.innerText = `⭐ ${score} / ${WIN_SCORE}`;
        progressBar.style.width = `${(score / WIN_SCORE) * 100}%`;
        livesDisplay.innerText = '❤️'.repeat(lives) + '🖤'.repeat(Math.max(0, 3 - lives));
    }

    function gameOver(win) {
        gameActive = false;
        endScreen.classList.remove('hidden');
        document.getElementById('end-title').innerText = win ? "ПОБЕДА! 🎉" : "ИГРА ОКОНЧЕНА";
        document.getElementById('end-message').innerText = win ? `Ты набрал ${score} очков!` : `Попробуй еще раз. Твой счет: ${score}`;
    }

    class FallingItem {
        constructor() {
            const data = foodData[Math.floor(Math.random() * foodData.length)];
            this.id = data.id;
            // Размер: 12% меньшей стороны экрана, но не меньше 55px и не больше 110px
            this.size = Math.max(55, Math.min(Math.min(canvas.width, canvas.height) * 0.12, 110));
            this.x = Math.random() * (canvas.width - this.size);
            this.y = -this.size;
            // Скорость в пикселях = ratio * высота экрана ± небольшой разброс
            this.speed = canvas.height * (FALL_SPEED_RATIO + Math.random() * 0.001);
        }
        update() { this.y += this.speed; }
        draw() {
            const img = foodImages[this.id];
            if (img && img.complete && img.naturalWidth) {
                ctx.drawImage(img, this.x, this.y, this.size, this.size);
            }
        }
    }

    function gameLoop(now) {
        if (!gameActive) return;
        const dt = now - lastTime;
        lastTime = now;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (images.background.complete) ctx.drawImage(images.background, 0, 0, canvas.width, canvas.height);

        spawnTimer += dt;
        if (spawnTimer > SPAWN_INTERVAL) { items.push(new FallingItem()); spawnTimer = 0; }

        // Гарантированный спавн целевого продукта через 1-3 сек после объявления
        if (!targetSpawned) {
            targetSpawnDelay -= dt;
            if (targetSpawnDelay <= 0) {
                targetSpawned = true;
                const target = new FallingItem();
                target.id = targetFood.id;
                items.push(target);
            }
        }

        const basketY = canvas.height - basketHeight - 20;
        for (let i = items.length - 1; i >= 0; i--) {
            const item = items[i];
            item.update();
            item.draw();

            if (item.y + item.size > basketY && item.x + item.size > basketX && item.x < basketX + basketWidth && item.y < basketY + 40) {
                if (item.id === targetFood.id) {
                    score += 3; updateUI();
                    if (score >= WIN_SCORE) return gameOver(true);
                    pickNewTarget();
                } else {
                    lives--; updateUI();
                    if (lives <= 0) return gameOver(false);
                }
                items.splice(i, 1);
                continue;
            }
            if (item.y > canvas.height) {
                if (item.id === targetFood.id) {
                    lives--; updateUI();
                    if (lives <= 0) return gameOver(false);
                    pickNewTarget();
                }
                items.splice(i, 1);
            }
        }
        if (images.basket.complete) ctx.drawImage(images.basket, basketX, basketY, basketWidth, basketHeight);
        requestAnimationFrame(gameLoop);
    }
    init();
</script>
</body>
</html>
